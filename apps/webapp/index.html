<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>It Works!</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      background: #1e293b;
      padding: 50px;
      border-radius: 16px;
      animation: pulse 3s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 rgba(14,165,233,0.4); }
      50% { box-shadow: 0 0 20px rgba(14,165,233,0.6); }
      100% { box-shadow: 0 0 0 rgba(14,165,233,0.4); }
    }
    h1 { font-size: 2.5rem; }
    p { margin: 10px 0; }
    .emoji { font-size: 3rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🚀</div>
    <h1>It's Alive!</h1>
    <p><strong>smithoo4.duckdns.org</strong> is up and running 🎉</p>
    
    <p id="status"></p>

    <p>🌐 <script>document.write(window.location.hostname)</script></p>
    <p>🕒 <script>document.write(new Date().toLocaleString())</script></p>

    <p style="font-size:0.8rem; opacity:0.6;">
      Powered by homelab magic ✨
    </p>
  </div>

  <script>
    const messages = [
      "All systems go ✅",
      "Nothing is on fire 🔥 (good!)",
      "Packets are flowing 🚿",
      "TLS handshake successful 🤝"
    ];
    document.getElementById("status").innerText =
      messages[Math.floor(Math.random() * messages.length)];
  </script>
</body>
</html>
